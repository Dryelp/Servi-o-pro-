<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#e07b2a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AutônomoPro">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>AutônomoPro</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#faf7f3;--sur:#fff;--sur2:#f5f0e8;--bor:#e8dfd2;
  --brn:#1e0f00;--brn2:#3d2008;
  --org:#e07b2a;--org2:#f59642;--org-bg:#fff4eb;
  --grn:#1a6b3c;--grn-bg:#e6f4ec;
  --red:#b83232;--red-bg:#fdeaea;
  --blu:#1d4ed8;--blu-bg:#dbeafe;
  --pur:#6d28d9;--pur-bg:#ede9fe;
  --txt:#1e0f00;--mut:#8a7060;
  --rad:14px;--shd:0 1px 12px rgba(30,15,0,.07);--shd2:0 4px 24px rgba(30,15,0,.13);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{overflow-x:hidden;max-width:100vw}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}

/* SIDEBAR */
.sidebar{width:252px;background:var(--brn);position:fixed;top:0;left:0;bottom:0;z-index:200;display:flex;flex-direction:column;overflow:hidden}
.logo{padding:22px 20px 16px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:11px;flex-shrink:0}
.logo-ico{width:40px;height:40px;background:var(--org);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.logo-name{font-family:'Fraunces',serif;font-size:1.15rem;font-weight:700;color:#fff}
.logo-sub{font-size:.65rem;color:rgba(255,255,255,.28);margin-top:1px}
.nav{flex:1;padding:10px 8px;overflow-y:auto;display:flex;flex-direction:column;gap:1px}
.nav-sec{font-size:.61rem;font-weight:700;color:rgba(255,255,255,.18);text-transform:uppercase;letter-spacing:1.2px;padding:12px 12px 4px}
.nb{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:.84rem;font-weight:500;color:rgba(255,255,255,.42);transition:all .14s;border:none;background:none;width:100%;text-align:left}
.nb:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.78)}
.nb.on{background:var(--org);color:#fff;font-weight:600}
.nb .ni{font-size:.9rem;width:18px;text-align:center;flex-shrink:0}
.notif-badge{background:#ef4444;color:#fff;font-size:.58rem;font-weight:700;padding:2px 5px;border-radius:10px;margin-left:auto;display:none}
.sfoot{padding:12px 18px;border-top:1px solid rgba(255,255,255,.07);font-size:.68rem;color:rgba(255,255,255,.22);flex-shrink:0}

/* MAIN */
.main{margin-left:252px;padding:28px 32px;min-height:100vh}

/* TOPBAR */
.topbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.pg-title{font-family:'Fraunces',serif;font-size:1.7rem;font-weight:700;color:var(--brn)}
.pg-sub{font-size:.8rem;color:var(--mut);margin-top:3px}
.tb-right{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.84rem;font-weight:600;cursor:pointer;transition:all .15s;border:none;white-space:nowrap}
.btn-brn{background:var(--brn);color:#fff}.btn-brn:hover{background:var(--brn2)}
.btn-org{background:var(--org);color:#fff}.btn-org:hover{background:var(--org2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.2)}
.btn-gho{background:var(--sur);color:var(--brn2);border:1.5px solid var(--bor)}.btn-gho:hover{border-color:var(--org);color:var(--org)}
.btn-grn{background:var(--grn);color:#fff}.btn-grn:hover{background:#155c32}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#9b2a2a}
.btn-wpp{background:#25d366;color:#fff}.btn-wpp:hover{background:#1da851}
.btn-pdf{background:var(--blu-bg);color:var(--blu);border:1px solid rgba(29,78,216,.15)}
.btn-sm{padding:5px 10px;font-size:.76rem}
.btn-ok{background:var(--grn-bg);color:var(--grn);border:1px solid rgba(26,107,60,.2)}
.btn-del{background:var(--red-bg);color:var(--red);border:1px solid rgba(184,50,50,.15)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.sc{background:var(--sur);border:1px solid var(--bor);border-radius:var(--rad);padding:16px 15px 13px;box-shadow:var(--shd);position:relative;overflow:hidden;transition:transform .18s,box-shadow .18s}
.sc:hover{transform:translateY(-2px);box-shadow:var(--shd2)}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--sc-c,var(--bor))}
.sc-ico{font-size:1.3rem;margin-bottom:8px}
.sc-lbl{font-size:.68rem;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.sc-val{font-family:'Fraunces',serif;font-size:1.55rem;font-weight:700;line-height:1;margin-bottom:5px}
.sc-hint{font-size:.73rem;color:var(--mut)}

/* PANEL */
.panel{background:var(--sur);border:1px solid var(--bor);border-radius:var(--rad);box-shadow:var(--shd);overflow:hidden}
.ph{padding:13px 18px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bor);background:var(--sur2);flex-wrap:wrap;gap:8px}
.pt{font-family:'Fraunces',serif;font-size:.93rem;font-weight:600;color:var(--brn)}
.pb{padding:14px}

/* TABLE */
.tw{background:var(--sur);border:1px solid var(--bor);border-radius:var(--rad);box-shadow:var(--shd);overflow:hidden;margin-bottom:18px}
.tw table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
.th{padding:13px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bor);background:var(--sur2);flex-wrap:wrap;gap:8px}
table{width:100%;border-collapse:collapse;font-size:.84rem}
thead th{padding:8px 14px;text-align:left;font-size:.66rem;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.6px;background:var(--sur2);border-bottom:1px solid var(--bor)}
tbody tr{border-bottom:1px solid var(--bor);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg)}
tbody td{padding:9px 14px;vertical-align:middle}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:.69rem;font-weight:600}
.badge::before{content:'●';font-size:.4rem}
.b-g{background:var(--grn-bg);color:var(--grn)}
.b-o{background:var(--org-bg);color:var(--org)}
.b-r{background:var(--red-bg);color:var(--red)}
.b-b{background:var(--blu-bg);color:var(--blu)}
.b-p{background:var(--pur-bg);color:var(--pur)}

/* PAGES */
.page{display:none}.page.active{display:block;animation:fadeUp .22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(20,8,0,.52);backdrop-filter:blur(4px);z-index:500;align-items:center;justify-content:center;padding:12px}
.overlay.open{display:flex}
.modal{background:var(--sur);border-radius:16px;padding:26px;width:480px;max-width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(30,15,0,.22);animation:popIn .22s cubic-bezier(.34,1.56,.64,1)}
.modal-lg{width:600px}
@keyframes popIn{from{transform:scale(.94) translateY(8px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.mt{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:700;color:var(--brn);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.xbtn{width:28px;height:28px;background:var(--sur2);border:none;border-radius:6px;cursor:pointer;color:var(--mut);font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .14s;flex-shrink:0}
.xbtn:hover{background:var(--bor)}
.fg{margin-bottom:11px}
.fl{display:block;font-size:.73rem;font-weight:700;color:var(--brn2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.fi,.fs{width:100%;background:var(--bg);border:1.5px solid var(--bor);border-radius:8px;padding:9px 11px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.86rem;color:var(--txt);outline:none;transition:border-color .15s,box-shadow .15s;appearance:none}
.fi:focus,.fs:focus{border-color:var(--org);box-shadow:0 0 0 3px rgba(0,0,0,.06)}
.fi::placeholder{color:var(--mut)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mf{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}

/* SERVIÇO CARD */
.srv-card{background:var(--sur);border:1.5px solid var(--bor);border-radius:var(--rad);padding:17px;box-shadow:var(--shd);margin-bottom:12px;transition:border-color .2s,box-shadow .2s}
.srv-card:hover{border-color:var(--org);opacity:.9;box-shadow:var(--shd2)}
.srv-card.sts-andamento{border-left:4px solid var(--pur)}
.srv-card.sts-realizado{border-left:4px solid var(--grn)}
.srv-card.sts-cancelado{border-left:4px solid var(--red);opacity:.6}
.srv-cli{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:700;color:var(--brn)}
.srv-tipo{font-size:.8rem;color:var(--mut);margin-top:2px}
.srv-end{font-size:.76rem;color:var(--mut);margin-top:2px}
.srv-prazo{font-size:.74rem;color:var(--org);font-weight:600;margin-top:3px}
.srv-etapas{font-size:.74rem;color:var(--blu);font-weight:600;margin-top:3px}
.srv-card-actions{display:flex;gap:6px;flex-wrap:wrap;padding-top:11px;border-top:1px solid var(--bor)}

/* MATERIAIS */
.mat-lista{border:1.5px solid var(--bor);border-radius:9px;overflow:hidden;margin-bottom:10px;min-height:38px}
.mat-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--bor);background:var(--bg)}
.mat-row:last-child{border-bottom:none}
.mat-desc{font-size:.84rem;font-weight:500;flex:1}
.mat-val-r{font-family:'Fraunces',serif;font-weight:700;font-size:.87rem;color:var(--red);white-space:nowrap}
.mat-val-g{font-family:'Fraunces',serif;font-weight:700;font-size:.87rem;color:var(--grn);white-space:nowrap}

/* SEARCH */
.search-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.search-inp{flex:1;min-width:180px;background:var(--sur);border:1.5px solid var(--bor);border-radius:9px;padding:9px 14px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.86rem;color:var(--txt);outline:none;transition:border-color .15s}
.search-inp:focus{border-color:var(--org)}

/* ORC CARD */
.orc-card{background:var(--sur);border:1.5px solid var(--bor);border-radius:var(--rad);padding:17px;box-shadow:var(--shd);margin-bottom:12px;transition:border-color .2s}
.orc-card:hover{border-color:var(--org)}
.orc-item-row{display:flex;justify-content:space-between;font-size:.82rem;padding:5px 0;border-bottom:1px dashed var(--bor)}
.orc-item-row:last-child{border-bottom:none}

/* AGENDA ROW */
.ag-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;background:var(--bg);border:1px solid var(--bor);transition:all .14s;margin-bottom:7px;cursor:pointer}
.ag-row:hover{border-color:var(--org);background:var(--org-bg)}
.ag-time{font-family:'Fraunces',serif;font-size:.9rem;font-weight:700;color:var(--org);min-width:44px}
.ag-name{font-weight:600;font-size:.85rem}
.ag-srv{font-size:.73rem;color:var(--mut);margin-top:1px}

/* CHART */
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:96px}
.cw{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.cb{width:100%;border-radius:4px 4px 0 0;min-height:3px;transition:height .7s cubic-bezier(.34,1.56,.64,1)}
.cb.now{background:linear-gradient(180deg,var(--org) 0%,var(--org2) 100%)}
.cb:not(.now){background:var(--brn);opacity:.13}

/* LUCRO BOX */
.lucro-box{background:linear-gradient(135deg,var(--grn-bg) 0%,#c8eed9 100%);border:1px solid rgba(26,107,60,.2);border-radius:10px;padding:13px;margin:12px 0}
.lucro-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-size:.83rem}
.lucro-row:last-child{margin-bottom:0;border-top:1px solid rgba(26,107,60,.15);padding-top:7px;margin-top:5px;font-weight:700;font-size:.9rem}

/* PERFIL WELCOME */
.welcome-overlay{display:none;position:fixed;inset:0;background:rgba(20,8,0,.75);backdrop-filter:blur(6px);z-index:900;align-items:center;justify-content:center;padding:16px}
.welcome-overlay.open{display:flex}
.welcome-box{background:var(--sur);border-radius:20px;padding:34px;width:400px;max-width:100%;text-align:center;box-shadow:0 24px 64px rgba(30,15,0,.3);animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
.welcome-ico{font-size:3.2rem;margin-bottom:12px}
.welcome-title{font-family:'Fraunces',serif;font-size:1.6rem;font-weight:700;color:var(--brn);margin-bottom:6px}
.welcome-sub{font-size:.84rem;color:var(--mut);margin-bottom:22px;line-height:1.6}

/* TOGGLE */
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--bor)}
.toggle-row:last-child{border-bottom:none}
.tl{font-size:.86rem;font-weight:600}.ts{font-size:.73rem;color:var(--mut);margin-top:2px}
.switch{position:relative;width:42px;height:23px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0;position:absolute}
.slider{position:absolute;cursor:pointer;inset:0;background:#ddd;border-radius:23px;transition:.28s}
.slider:before{content:'';position:absolute;width:17px;height:17px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.28s}
input:checked+.slider{background:var(--org)}
input:checked+.slider:before{transform:translateX(19px)}

/* NOTIF */
.notif-item{display:flex;align-items:flex-start;gap:12px;padding:13px 17px;border-bottom:1px solid var(--bor);cursor:pointer;transition:background .1s}
.notif-item:last-child{border-bottom:none}
.notif-item.unread{background:var(--org-bg)}
.notif-ico{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0}
.notif-title{font-weight:600;font-size:.85rem;margin-bottom:2px}
.notif-msg{font-size:.76rem;color:var(--mut);line-height:1.4}
.notif-time{font-size:.68rem;color:var(--mut);white-space:nowrap}

/* CFG */
.cfg-sec{background:var(--sur);border:1px solid var(--bor);border-radius:var(--rad);padding:20px;box-shadow:var(--shd);margin-bottom:14px}
.cfg-t{font-family:'Fraunces',serif;font-size:.97rem;font-weight:600;color:var(--brn);margin-bottom:13px;display:flex;align-items:center;gap:6px}

/* RELATÓRIO DETALHADO */
.rel-oculto{display:none!important}

/* EMPTY / TOAST */
.empty{text-align:center;padding:30px 14px;color:var(--mut);font-size:.84rem}
.empty-ico{font-size:1.8rem;margin-bottom:7px}
.toast{position:fixed;bottom:22px;right:22px;background:var(--brn);color:#fff;padding:11px 17px;border-radius:10px;font-size:.84rem;font-weight:500;z-index:9999;display:none;box-shadow:0 8px 28px rgba(30,15,0,.26);max-width:300px;animation:slideIn .2s ease}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

/* MOBILE */
.mob-bar{display:none}
.mob-more-menu{display:none;position:fixed;bottom:62px;left:0;right:0;background:var(--brn);border-top:1px solid rgba(255,255,255,.08);z-index:299;padding:9px;gap:6px}
.mob-more-menu.open{display:flex;flex-wrap:wrap}
.mob-more-btn{flex:1;min-width:calc(33.3% - 6px);display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 6px;border-radius:9px;background:rgba(255,255,255,.06);border:none;cursor:pointer;font-size:.68rem;font-weight:600;color:rgba(255,255,255,.55);font-family:'Plus Jakarta Sans',sans-serif}
.mob-more-btn .mi{font-size:1.1rem}
.mob-more-btn:hover,.mob-more-btn.on{background:var(--org);color:#fff}

@media(max-width:900px){
  .sidebar{display:none}
  .main{margin-left:0;padding:12px 11px 80px;overflow-x:hidden}
  .stats{grid-template-columns:1fr 1fr}
  .topbar{gap:9px}
  .tb-right{width:100%}
  .tb-right .btn{flex:1;justify-content:center}
  .mob-bar{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--brn);border-top:1px solid rgba(255,255,255,.08);z-index:300;padding:3px 0 env(safe-area-inset-bottom,3px)}
  .mb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 2px;cursor:pointer;font-size:.58rem;font-weight:600;color:rgba(255,255,255,.38);border:none;background:none;position:relative;font-family:'Plus Jakarta Sans',sans-serif}
  .mb .mi{font-size:1.15rem}.mb.on{color:var(--org2)}
  .mb .mn-dot{position:absolute;top:4px;right:calc(50% - 14px);width:6px;height:6px;background:#ef4444;border-radius:50%;border:1.5px solid var(--brn);display:none}
  .mb .mn-dot.show{display:block}
  .dash-grid{grid-template-columns:1fr!important}
  /* Oculta colunas menos importantes no mobile */
  .hide-mob{display:none!important}
  table{font-size:.78rem}
  tbody td{padding:7px 10px}
  thead th{padding:7px 10px}
}
</style>
</head>
<body>

<!-- BANNER ATUALIZAÇÃO -->
<div id="update-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:var(--grn);color:#fff;padding:11px 18px;display:none;align-items:center;justify-content:space-between;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,.2);flex-wrap:wrap">
  <div style="display:flex;align-items:center;gap:8px;font-size:.86rem;font-weight:600">
    🔄 Nova versão disponível!
  </div>
  <button onclick="atualizarApp()" style="background:#fff;color:var(--grn);border:none;border-radius:7px;padding:7px 14px;font-weight:700;font-size:.82rem;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif">
    Atualizar agora
  </button>
</div>

<!-- WELCOME -->
<div class="welcome-overlay" id="welcome">
  <div class="welcome-box">
    <div class="welcome-ico" id="welcome-ico">🛠️</div>
    <div class="welcome-title" id="welcome-title">Bem-vindo ao AutônomoPro!</div>
    <div class="welcome-sub">Gestão completa para autônomos de qualquer segmento.<br>Antes de começar, nos diga quem é você!</div>
    <div class="fg" style="text-align:left"><label class="fl">Seu nome</label><input class="fi" id="p-nome" placeholder="Ex: João Silva"></div>
    <div class="fg" style="text-align:left"><label class="fl">Tipo de serviço que você faz</label><input class="fi" id="p-tipo" placeholder="Ex: Elétrica, frete, doces..."></div>
    <button class="btn btn-org" style="width:100%;justify-content:center;margin-top:6px;padding:12px" onclick="salvarPerfil()">Começar agora 🚀</button>
  </div>
</div>

<div style="display:flex;min-height:100vh">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-ico">🛠️</div>
    <div><div class="logo-name" id="logo-nome">AutônomoPro</div><div class="logo-sub" id="sb-tipo">Gestão de Serviços</div></div>
  </div>
  <nav class="nav">
    <div class="nav-sec">Principal</div>
    <button class="nb on" onclick="ir('dashboard',this)"><span class="ni">🏠</span>Início</button>
    <button class="nb" onclick="ir('servicos',this)"><span class="ni">🔧</span>Serviços</button>
    <div class="nav-sec">Financeiro</div>
    <button class="nb" onclick="ir('recebimentos',this)"><span class="ni">💵</span>Recebimentos</button>
    <button class="nb" onclick="ir('despesas',this)"><span class="ni">💸</span>Despesas</button>
